services:
  coffee-tracker:
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - coffee-tracker:${APP_VERSION:-latest}
        - coffee-tracker:latest
    image: coffee-tracker:${APP_VERSION:-latest}
    container_name: coffee-tracker-sync
    ports:
      - "5001:5001"
    restart: always
    environment:
      - NODE_ENV=production
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5001}
    env_file:
      - .env  # For runtime config (Facebook OAuth, etc.), NOT for APP_VERSION
    volumes:
      # Persist database to local machine (./data directory)
      - ./data:/app/data
    # Allow network access
    network_mode: "bridge"
